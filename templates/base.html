{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ресторан "Берег"{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bereg-dark': '#1a2a3a',
                        'bereg-gold': '#c5a065',
                        'bereg-sand': '#f4f1ea',
                        'bereg-blue': '#2c5f7c',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Lato"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f4f1ea; color: #1a2a3a; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nav-link.active { color: #c5a065; border-bottom: 2px solid #c5a065; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="font-sans antialiased flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-bereg-dark text-white sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-2xl font-serif font-bold text-bereg-gold tracking-widest">
                <i class="fas fa-anchor mr-2"></i>БЕРЕГ
            </a>
            <nav class="hidden md:flex space-x-8">
                <a href="{% url 'home' %}" class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% else %}text-white{% endif %} hover:text-bereg-gold transition duration-300 py-2">Главная</a>
                <a href="{% url 'menu' %}" class="nav-link {% if request.resolver_match.url_name == 'menu' %}active{% else %}text-white{% endif %} hover:text-bereg-gold transition duration-300 py-2">Меню</a>
                <a href="{% url 'reservation' %}" class="nav-link {% if request.resolver_match.url_name == 'reservation' %}active{% else %}text-white{% endif %} hover:text-bereg-gold transition duration-300 py-2">Бронь</a>
                <a href="{% url 'contacts' %}" class="nav-link {% if request.resolver_match.url_name == 'contacts' %}active{% else %}text-white{% endif %} hover:text-bereg-gold transition duration-300 py-2">Контакты</a>
            </nav>
            <button class="md:hidden text-bereg-gold" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                <i class="fas fa-bars text-2xl"></i>
            </button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-bereg-dark border-t border-gray-700">
            <a href="{% url 'home' %}" class="block px-4 py-3 hover:bg-gray-800 text-bereg-gold">Главная</a>
            <a href="{% url 'menu' %}" class="block px-4 py-3 hover:bg-gray-800">Меню</a>
            <a href="{% url 'reservation' %}" class="block px-4 py-3 hover:bg-gray-800">Бронь столика</a>
            <a href="{% url 'contacts' %}" class="block px-4 py-3 hover:bg-gray-800">Контакты</a>
        </div>
    </header>

    <!-- Content -->
    <main class="flex-grow fade-in">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-bereg-dark text-white py-8 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <div class="text-2xl font-serif font-bold text-bereg-gold mb-4">БЕРЕГ</div>
            <div class="flex justify-center space-x-6 mb-6 text-sm text-gray-400">
                <a href="{% url 'home' %}" class="hover:text-white">Главная</a>
                <a href="{% url 'menu' %}" class="hover:text-white">Меню</a>
                <a href="{% url 'reservation' %}" class="hover:text-white">Бронь</a>
                <a href="{% url 'contacts' %}" class="hover:text-white">Контакты</a>
            </div>
            <p class="text-gray-500 text-sm">&copy; 2025 Ресторан "Берег". Все права защищены.</p>
        </div>
    </footer>

</body>
</html>
